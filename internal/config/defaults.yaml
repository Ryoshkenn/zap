providers:
  - id: claude
    name: Claude Code
    command: claude
    icon: "🤖"
    install_hint: "npm install -g @anthropic-ai/claude-code"
    flags:
      - id: yolo
        label: "Dangerously skip permissions"
        flag: "--dangerously-skip-permissions"
        default: false
  - id: codex
    name: Codex CLI
    command: codex
    icon: "🧠"
    install_hint: "npm install -g @openai/codex"
  - id: gemini
    name: Gemini CLI
    command: gemini
    icon: "✨"
    install_hint: "npm install -g @google/gemini-cli"
  - id: opencode
    name: opencode
    command: opencode
    icon: "📂"
    install_hint: "See https://github.com/sst/opencode"
