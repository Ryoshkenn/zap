providers:
  - id: claude
    name: Claude Code
    command: claude
    icon: "🤖"
    install_hint: "npm install -g @anthropic-ai/claude-code"
    flags:
      - id: yolo
        label: "Dangerously skip permissions"
        flag: "--dangerously-skip-permissions"
        default: false
  - id: codex
    name: Codex CLI
    command: codex
    icon: "🧠"
    install_hint: "npm install -g @openai/codex"
    flags:
      - id: yolo
        label: "YOLO mode (dangerously bypass approvals & sandbox)"
        flag: "--dangerously-bypass-approvals-and-sandbox"
        default: false
      - id: full_auto
        label: "Full auto (ask-on-request + workspace-write sandbox)"
        flag: "--full-auto"
        default: false
  - id: gemini
    name: Gemini CLI
    command: gemini
    icon: "✨"
    install_hint: "npm install -g @google/gemini-cli"
    flags:
      - id: yolo
        label: "YOLO mode (auto-approve all tool calls)"
        flag: "--yolo"
        default: false
  - id: opencode
    name: opencode
    command: opencode
    icon: "📂"
    install_hint: "See https://github.com/sst/opencode"
    flags:
      - id: yolo
        label: "Dangerously skip permissions"
        flag: "--dangerously-skip-permissions"
        default: false
  - id: cursor
    name: Cursor
    command: cursor
    icon: "🖱️"
    launch_mode: app
    app_bundle: "Cursor"
    install_hint: "Download from https://cursor.com"
  - id: windsurf
    name: Windsurf
    command: windsurf
    icon: "🏄"
    launch_mode: app
    app_bundle: "Windsurf"
    install_hint: "Download from https://windsurf.com"
  - id: vscode
    name: VS Code
    command: code
    icon: "💻"
    launch_mode: app
    app_bundle: "Visual Studio Code"
    install_hint: "Download from https://code.visualstudio.com"
  - id: ollama
    name: Ollama
    command: ollama
    icon: "🦙"
    install_hint: "Download from https://ollama.com"
    model_selector: true
